<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Services - Novia_Beautyverse</title>
</head>
<body>

<nav>
    <h1>✨ Services ✨</h1>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="videos.html">Videos</a>
</nav>

<div class="hero">
    <h2>Our Beauty Hosting Packages</h2>
    
    <div style="display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;">
    
    <!-- Paket 1 -->
    <div class="card">
        <button onclick="showImage('img-basic')" style="border: none; background: none; cursor: pointer;">
            <h3>Basic Glow</h3>
            <p>Perfect for starters!</p>
        </button>
        <img id="img-basic" src="basic glow.jpeg" alt="Basic Glow">
    </div>

    <!-- Paket 2 -->
    <div class="card">
        <button onclick="showImage('img-premium')" style="border: none; background: none; cursor: pointer;">
            <h3>Premium Glam</h3>
            <p>For ultimate beauty creators!</p>
        </button>
        <img id="img-premium" src="premium glow.jpeg" alt="Premium Glam">
    </div>

</div>

<script>
    function showImage(id) {
        var img = document.getElementById(id);
        // Menutup gambar lain jika ada agar tidak tumpang tindih
        document.getElementById('img-basic').style.display = 'none';
        document.getElementById('img-premium').style.display = 'none';
        
        // Membuka gambar yang diklik
        img.style.display = "block";
    }
</script>

</body>
</html>
</html>
